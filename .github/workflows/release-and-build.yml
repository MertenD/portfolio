name: Release + Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meta:
    name: Meta (read version)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

  release:
    name: Release (tag + GitHub release)
    runs-on: ubuntu-latest
    needs: [ meta ]
    outputs:
      tag_existed: ${{ steps.tag.outputs.exists }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure git tag v<version> exists
        id: tag
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -e
          git fetch --tags --force
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Create GitHub Release (if not existing)
        uses: softprops/action-gh-release@v2
        if: ${{ steps.tag.outputs.exists == 'false' }}
        with:
          tag_name: v${{ needs.meta.outputs.version }}
          name: v${{ needs.meta.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker (build + push)
    runs-on: ubuntu-latest
    needs: [ release, meta ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mertend/portfolio:${{ needs.meta.outputs.version }}
            mertend/portfolio:latest
