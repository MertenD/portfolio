name: Release + Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meta:
    name: Meta (read version)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  release:
    name: Release (tag + GitHub release)
    runs-on: ubuntu-latest
    needs: [ meta ]
    outputs:
      tag_existed: ${{ steps.tag.outputs.exists }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure git tag v<version> exists
        id: tag
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Collect changes since last tag
        id: changes
        if: ${{ steps.tag.outputs.exists == 'false' }}
        uses: ./.github/actions/collect-release-changes
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-branch: main
          max-prs: "50"

      - name: Generate professional release notes (LLM, optional)
        id: llm_notes
        if: ${{ steps.tag.outputs.exists == 'false' }}
        uses: ./.github/actions/generate-llm-release-notes
        with:
          api-key: ${{ secrets.RELEASE_NOTES_OPENAI_API_KEY }}
          input-path: ${{ steps.changes.outputs.path }}
          base-url: ${{ secrets.RELEASE_NOTES_OPENAI_BASE_URL }}
          model: ${{ secrets.RELEASE_NOTES_OPENAI_MODEL }}
          language: en

      - name: Create GitHub Release (LLM notes preferred)
        uses: softprops/action-gh-release@v2
        if: ${{ steps.tag.outputs.exists == 'false' }}
        with:
          tag_name: v${{ needs.meta.outputs.version }}
          name: v${{ needs.meta.outputs.version }}
          body: ${{ steps.llm_notes.outputs.notes }}
          generate_release_notes: ${{ steps.llm_notes.outputs.notes == '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker (build + push)
    runs-on: ubuntu-latest
    needs: [ release, meta ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mertend/portfolio:${{ needs.meta.outputs.version }}
            mertend/portfolio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
