name: "Collect Release Changes"
description: "Collect PRs (preferred) or commit subjects since the latest v* tag and write a JSON file for downstream summarization."

inputs:
  github-token:
    description: "GitHub token (GITHUB_TOKEN) used by gh api"
    required: true
  base-branch:
    description: "Base branch used to list recent merged PRs when no previous tag exists"
    required: false
    default: "main"
  max-prs:
    description: "Max PRs to fetch when no previous tag exists"
    required: false
    default: "50"

outputs:
  path:
    description: "Path to the JSON file containing changes"
    value: ${{ steps.collect.outputs.path }}
  latest_tag:
    description: "Latest v* tag (empty if none)"
    value: ${{ steps.collect.outputs.latest_tag }}

runs:
  using: "composite"
  steps:
    - name: Collect changes
      id: collect
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        MAX_PRS: ${{ inputs.max-prs }}
      run: |
        set -euo pipefail

        # Ensure we have full history + tags and are on the right branch.
        git fetch --prune --force --tags origin "+refs/heads/*:refs/remotes/origin/*"
        git checkout -B "${GITHUB_REF_NAME:-$BASE_BRANCH}" "origin/${GITHUB_REF_NAME:-$BASE_BRANCH}" 2>/dev/null || true

        # NOTE: In the release workflow we create and push the NEW tag first.
        # So the "latest" v* tag at this point is usually the tag we just created.
        # For collecting changes we want the previous v* tag.
        TAGS=( $(git tag -l 'v*' --sort=-v:refname) )
        LATEST_TAG="${TAGS[0]:-}"
        PREV_TAG="${TAGS[1]:-}"

        # Expose the latest tag (kept for backwards compatibility of the output)
        echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

        RANGE=""
        if [[ -n "$PREV_TAG" ]]; then
          RANGE="$PREV_TAG..HEAD"
          echo "Using range (previous tag): $RANGE" >&2
        elif [[ -n "$LATEST_TAG" ]]; then
          # Only one tag exists (likely the just-created one). Fall back to finding the tag pointing to HEAD and use commits since its creation.
          # This scenario typically means first release; we'll use recent merged PRs as before.
          echo "Only one v* tag found ($LATEST_TAG). Falling back to recent merged PRs on base '$BASE_BRANCH'." >&2
        else
          echo "No previous tag found. Using last $MAX_PRS merged PRs for base '$BASE_BRANCH'." >&2
        fi

        # Create a JSON payload.
        # Prefer gh+API (PR objects). Fall back to commit subjects if gh isn't available OR if we found 0 PRs.
        if command -v gh >/dev/null 2>&1; then
          if [[ -z "$RANGE" ]]; then
            gh api -H "Accept: application/vnd.github+json" \
              "/repos/$REPO/pulls?state=closed&base=$BASE_BRANCH&per_page=$MAX_PRS&sort=updated&direction=desc" \
              --jq '[.[] | select(.merged_at != null) | {number, title, body, url, author: .user.login, merged_at, labels: [.labels[].name]}]' > changes.json
          else
            COMMITS=$(git rev-list "$RANGE" || true)
            echo "[]" > changes.json
            for sha in $COMMITS; do
              gh api -H "Accept: application/vnd.github+json" \
                "/repos/$REPO/commits/$sha/pulls" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                --jq '[.[] | {number, title, body, url, author: .user.login, merged_at, labels: [.labels[].name]}]' \
                > pr_tmp.json || true
              jq -s 'add | unique_by(.url)' changes.json pr_tmp.json > changes_merged.json
              mv changes_merged.json changes.json
            done
          fi

          COUNT=$(jq 'length' changes.json)
          echo "Found $COUNT PRs" >&2

          if [[ "$COUNT" -gt 0 ]]; then
            echo "Fetching changed files and commits for PRs..." >&2
            jq -c '.[]' changes.json | while read -r pr; do
              num=$(echo "$pr" | jq -r '.number')
              files=$(gh api -H "Accept: application/vnd.github+json" "/repos/$REPO/pulls/$num/files" --jq '[.[].filename]' 2>/dev/null || echo "[]")
              commits=$(gh api -H "Accept: application/vnd.github+json" "/repos/$REPO/pulls/$num/commits" --jq '[.[].commit.message]' 2>/dev/null || echo "[]")
              echo "$pr" | jq --argjson f "$files" --argjson c "$commits" '. + {files: $f, commits: $c}'
            done | jq -s '.' > changes_with_files.json
            mv changes_with_files.json changes.json
          fi

          # If we have a range but got 0 PRs (common for direct commits / API limitations), fall back to commits in the range.
          if [[ -n "$RANGE" && "$COUNT" -eq 0 ]]; then
            echo "0 PRs found in range; falling back to commit subjects for $RANGE." >&2
            git log "$RANGE" --pretty=format:'%H%x09%s' | while IFS=$'\t' read -r hash subj; do
              files=$(git show --name-only --format="" "$hash" | awk NF | jq -R . | jq -s .)
              jq -n --arg s "$subj" --argjson f "${files:-[]}" '{commit: $s, files: $f}'
            done | jq -s '{commits: .}' > changes.json
          fi
        else
          echo "gh CLI not found - falling back to commit subjects." >&2
          if [[ -z "$RANGE" ]]; then
            git log -n 50 --pretty=format:'%H%x09%s' | while IFS=$'\t' read -r hash subj; do
              files=$(git show --name-only --format="" "$hash" | awk NF | jq -R . | jq -s .)
              jq -n --arg s "$subj" --argjson f "${files:-[]}" '{commit: $s, files: $f}'
            done | jq -s '{commits: .}' > changes.json
          else
            git log "$RANGE" --pretty=format:'%H%x09%s' | while IFS=$'\t' read -r hash subj; do
              files=$(git show --name-only --format="" "$hash" | awk NF | jq -R . | jq -s .)
              jq -n --arg s "$subj" --argjson f "${files:-[]}" '{commit: $s, files: $f}'
            done | jq -s '{commits: .}' > changes.json
          fi
        fi

        echo "::group::Collected changes (changes.json)"
        cat changes.json
        echo "::endgroup::"

        echo "path=changes.json" >> "$GITHUB_OUTPUT"
