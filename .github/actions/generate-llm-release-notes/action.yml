name: "Generate LLM Release Notes"
description: "Generate professional release notes from a JSON changelog payload using an OpenAI-compatible API."

inputs:
  api-key:
    description: "OpenAI-compatible API key"
    required: false
  input-path:
    description: "Path to JSON file produced by collect-release-changes"
    required: true
  model:
    description: "Model name"
    required: false
    default: "gpt-4o-mini"
  base-url:
    description: "OpenAI base URL (OpenAI-compatible). Should end with /v1"
    required: false
    default: "https://api.openai.com/v1"
  language:
    description: "Language for release notes"
    required: false
    default: "en"

outputs:
  notes:
    description: "Generated release notes (Markdown)"
    value: ${{ steps.gen.outputs.notes }}

runs:
  using: "composite"
  steps:
    - name: Generate notes
      id: gen
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.api-key }}
        OPENAI_MODEL: ${{ inputs.model }}
        OPENAI_BASE_URL: ${{ inputs.base-url }}
        INPUT_PATH: ${{ inputs.input-path }}
        LANGUAGE: ${{ inputs.language }}
      run: |
        set -euo pipefail

        if [[ -z "${OPENAI_API_KEY:-}" ]]; then
          echo "OPENAI_API_KEY not set - skipping LLM release notes." >&2
          exit 0
        fi

        if [[ ! -f "$INPUT_PATH" ]]; then
          echo "Input file not found: $INPUT_PATH" >&2
          exit 1
        fi

        MODEL="$OPENAI_MODEL"
        BASE_URL="$OPENAI_BASE_URL"
        INPUT=$(cat "$INPUT_PATH")

        # Always English.
        SYS="You write release notes for a software release."

        # Build the user prompt safely (avoid quoting issues with apostrophes/parentheses).
        USER_PROMPT=$(cat <<'PROMPT'
        You are a release-notes writer. Create professional release notes in English based on the JSON data below.

        IMPORTANT: Only describe WHAT changed. Do not invent anything.
        Omit empty categories entirely. Never output placeholders like "No new features in this release".
        Requirements:
        - Output: Markdown
        - Use only these headings (only when non-empty): ## Features, ## Fixes, ## Documentation, ## Maintenance
        - Under each heading use '- ' bullets (short, user-facing; avoid internal implementation details like file names/refactors/formatting)
        - If PR data exists: end each bullet with ' (#<number>) <link>'
        - No intro text, no closing text, no empty sections

        Data (JSON):
        PROMPT
        )

        # Append JSON payload.
        USER_PROMPT+="$INPUT"

        BODY=$(jq -n --arg model "$MODEL" --arg sys "$SYS" --arg user "$USER_PROMPT" '{
          model: $model,
          messages: [
            {role:"system", content:$sys},
            {role:"user", content:$user}
          ],
          temperature: 0.2
        }')

        echo "::group::LLM request (sanitized)"
        echo "Base URL: $BASE_URL"
        echo "Model: $MODEL"
        echo "Language: $LANGUAGE"
        echo "Request JSON (truncated to 12000 chars):"
        echo "$BODY" | head -c 12000
        echo
        echo "::endgroup::"

        RAW_RESPONSE=$(curl -sS -X POST "$BASE_URL/chat/completions" \
          -H "Authorization: Bearer $OPENAI_API_KEY" \
          -H "Content-Type: application/json" \
          -d "$BODY")

        echo "::group::LLM raw response (truncated)"
        echo "$RAW_RESPONSE" | head -c 12000
        echo
        echo "::endgroup::"

        NOTES=$(echo "$RAW_RESPONSE" | jq -r '.choices[0].message.content // empty')

        # Post-process to avoid placeholder sections like "No ... in this release".
        # 1) Drop any lines containing these placeholders
        # 2) Drop empty headings
        # 3) If nothing meaningful remains, set a single fallback bullet.
        CLEANED_NOTES=$(printf '%s\n' "$NOTES" |
          sed -E 's/\r$//' |
          sed -E '/\bNo (new features|features|fixes|documentation updates|maintenance updates) in this release\.?\b/Id' |
          sed -E '/^## (Features|Fixes|Documentation|Maintenance)\s*$/N; s/^## (Features|Fixes|Documentation|Maintenance)\s*\n(\s*)$/\2/;' |
          sed -E '/^\s*$/d'
        )

        if [[ -z "${CLEANED_NOTES//[[:space:]]/}" ]]; then
          CLEANED_NOTES="- Internal maintenance and CI updates"
        fi

        echo "::group::LLM extracted notes (cleaned, truncated)"
        echo "$CLEANED_NOTES" | head -c 12000
        echo
        echo "::endgroup::"

        NOTES="$CLEANED_NOTES"

        if [[ -z "$NOTES" ]]; then
          echo "LLM did not return any content." >&2
          exit 1
        fi

        DELIM="EOF_$(date +%s%N)"
        {
          printf 'notes<<%s\n' "$DELIM"
          printf '%s\n' "$NOTES"
          printf '%s\n' "$DELIM"
        } >> "$GITHUB_OUTPUT"
